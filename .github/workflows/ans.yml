name: practice

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci 
      - run: npm test 
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci 
      - run: npm run lint
      - run: npm test
  deploy:
    runs-on: ubuntu-latest
    needs:
      - test
      - validate
    steps:
      - uses: actions/checkout@v4
      - run: echo "deploying..............."